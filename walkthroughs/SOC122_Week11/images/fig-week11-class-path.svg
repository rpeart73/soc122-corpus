<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" role="img" aria-labelledby="title desc">
<title id="title">SOC122 Week 11 three part class path</title>
<desc id="desc">Diagram showing the week moving through setting, source work, and application.</desc>
<rect width="680" height="440" fill="#ffffff"/>
<text x="340" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#15171C">Three Part Class Path</text>
<rect x="35" y="130" width="190" height="185" rx="8" fill="#FFF6F5" stroke="#DA291C" stroke-width="3"/>
<text x="130.0" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#15171C">Act I</text>
<text x="130.0" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">Introduce identity</text>
<text x="130.0" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">development, social</text>
<text x="130.0" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">influence, and well</text>
<rect x="245" y="130" width="190" height="185" rx="8" fill="#ffffff" stroke="#DA291C" stroke-width="3"/>
<text x="340.0" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#15171C">Act II</text>
<text x="340.0" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">Discuss how identity is</text>
<text x="340.0" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">shaped by belonging and</text>
<text x="340.0" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">culture, drawing on the</text>
<rect x="455" y="130" width="190" height="185" rx="8" fill="#F7F7F7" stroke="#DA291C" stroke-width="3"/>
<text x="550.0" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#15171C">Act III</text>
<text x="550.0" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">Students map one part of</text>
<text x="550.0" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">their own identity to</text>
<text x="550.0" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">the relationships and</text>
<line x1="225" y1="222" x2="245" y2="222" stroke="#DA291C" stroke-width="5"/>
<line x1="435" y1="222" x2="455" y2="222" stroke="#DA291C" stroke-width="5"/>
<text x="340" y="365" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600" fill="#333333">Set the stage, work with sources, then apply the idea.</text>
</svg>