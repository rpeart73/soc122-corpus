<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" role="img" aria-labelledby="title desc">
<title id="title">SOC122 Week 7 Two-Eyed Seeing frame</title>
<desc id="desc">Diagram showing Indigenous and Western eyes held together around the week topic.</desc>
<rect width="680" height="440" fill="#ffffff"/>
