<text x="507.0" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">Methods, evidence,</text>
<text x="507.0" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">institutions,</text>
<text x="507.0" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">measurement, concepts</text>
<line x1="298" y1="205" x2="382" y2="205" stroke="#DA291C" stroke-width="5"/>
<circle cx="340" cy="205" r="42" fill="#DA291C"/>
<text x="340" y="199" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Use</text>
<text x="340" y="224" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Both</text>
<rect x="105" y="318" width="470" height="70" rx="8" fill="#ffffff" stroke="#DA291C" stroke-width="3"/>
<text x="340.0" y="352" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#15171C">Central Question</text>
<text x="340.0" y="384" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">What do the first half</text>
<text x="340.0" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">of the course&#x27;s ideas</text>
