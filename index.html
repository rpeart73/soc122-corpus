<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SOC122 Corpus: the course source library</title>
<meta name="description" content="The reading room for SOC122 Introduction to the Social Sciences at Seneca Polytechnic. Search, compare, and follow how the course's readings connect. A companion to Blackboard.">
<link rel="stylesheet" href="./fonts/fonts.css">
<style>
  :root{
    --navy:#1B2A4A; --red:#DA291C; --red-dark:#961A13; --amber:#F2A900; --page:#F7F8FA; --surface:#fff;
    --surface-alt:#FBFCFD; --soft:#EEF1F5; --border:#DEE3EA; --border-hover:#C9D1DC;
    --ink:#15171C; --ink-dim:#474C57; --ink-faint:#6B7280; --focus:#1552D8;
    --sans:'IBM Plex Sans',ui-sans-serif,system-ui,'Segoe UI',Arial,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);background:var(--page);color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  ::selection{background:#FCEFD2}
  *:focus-visible{outline:2px solid var(--focus);outline-offset:2px;border-radius:4px}
  a{color:#0b4fc0}
  .mono{font-family:var(--mono)}
  .skip{position:absolute;left:-999px;top:0;background:var(--ink);color:#fff;padding:10px 16px;z-index:200;border-radius:0 0 8px 0}
  .skip:focus{left:0}
  .vh{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
  .soc-weekstrip{display:none}
  @keyframes riseUp{from{transform:translateY(8px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .rise{animation:riseUp .26s ease both}
  .scrollarea::-webkit-scrollbar{width:10px;height:10px}
  .scrollarea::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;border:3px solid var(--page)}
  .hshelf::-webkit-scrollbar{height:9px}
  .hshelf::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
  /* hover states (prototype used a custom style-hover; here as classes) */
  .card{transition:box-shadow .15s ease,border-color .15s ease}
  .card:hover{box-shadow:0 6px 18px rgba(27,42,74,.12);border-color:var(--border-hover)}
  .idxrow:hover{background:var(--surface-alt)}
  .relrow{transition:box-shadow .15s ease,border-color .15s ease}
  .relrow:hover{border-color:var(--border-hover);box-shadow:0 3px 10px rgba(27,42,74,.08)}
  .flip{perspective:1200px;height:248px;border:none;background:none;padding:0;display:block;width:100%;text-align:left;cursor:pointer}
  .flip-inner{position:relative;display:block;width:100%;height:100%;transition:transform .55s cubic-bezier(.2,.7,.2,1);transform-style:preserve-3d}
  .flip.flipped .flip-inner{transform:rotateY(180deg)}
  .flip-face{position:absolute;inset:0;display:flex;flex-direction:column;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--border);border-radius:14px;padding:17px 18px;overflow:auto;box-shadow:0 1px 2px rgba(21,23,28,.04)}
  .flip-front{background:#fff}
  .flip-back{background:#1B2A4A;color:#fff;transform:rotateY(180deg)}
  .flip:hover .flip-front{border-color:var(--border-hover);box-shadow:0 6px 18px rgba(27,42,74,.12)}
  @media (prefers-reduced-motion:reduce){.flip-inner{transition:none}}
  .mapsrc:hover{background:var(--page)}
  .addtile:hover{border-color:var(--navy)!important;color:var(--navy)!important}
  .pickchip:hover{border-color:var(--navy)!important}
  .removebtn:hover{color:var(--red)!important}
  /* immersive journey shell */
  .jhero{position:relative;overflow:hidden;border-radius:16px;color:var(--ink);padding:40px 42px 38px;background:#fff;border:1px solid var(--border);border-top:4px solid var(--red);box-shadow:0 1px 2px rgba(21,23,28,.04)}
  .jhero-art{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .jhero-cta{display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;border:none;border-radius:11px;padding:13px 22px;font-size:1rem;font-weight:600;box-shadow:0 8px 22px rgba(218,41,28,.32);transition:transform .15s ease,box-shadow .15s ease}
  .jhero-cta:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(218,41,28,.44)}
  .jstation{position:relative;display:block;width:100%;text-align:left;border:1px solid var(--border);background:#fff;border-radius:14px;padding:16px 18px;cursor:pointer;transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}
  .jstation:hover{transform:translateX(3px);box-shadow:0 8px 22px rgba(27,42,74,.13);border-color:var(--border-hover)}
  .jstation.cur{border-color:var(--red);box-shadow:0 0 0 1px var(--red)}
  .jdot{transition:transform .16s ease}
  .jstation:hover .jdot{transform:scale(1.07)}
  .jtile{display:flex;flex-direction:column;gap:8px;border:1px solid var(--border);background:#fff;border-radius:16px;padding:20px;text-align:left;cursor:pointer;transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}
  .jtile:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(27,42,74,.14);border-color:var(--border-hover)}
  @keyframes heroFloat{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .jfade{animation:heroFloat .5s cubic-bezier(.2,.7,.2,1) both}
  .soc-mapgrid{display:grid;grid-template-columns:1.5fr .9fr;gap:18px;align-items:start}
  @media (max-width:820px){ .soc-mapgrid{grid-template-columns:1fr} }
  .leaflet-popup-content{font-family:var(--sans);margin:12px 14px;line-height:1.45}
  .leaflet-container{font-family:var(--sans)}
  .soc-pin{width:20px;height:20px;border-radius:50%;background:var(--red);border:2.5px solid #fff;box-shadow:0 1px 5px rgba(21,23,28,.45);cursor:pointer}
  @media (max-width:760px){ .jhero{padding:34px 22px 30px} }
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
  @media (max-width:760px){
    .soc-sidebar{display:none!important}
    .soc-detailgrid{grid-template-columns:1fr!important}
    .soc-rail{position:static!important}
    .soc-pickbox{max-height:none!important}
    .soc-weekstrip{display:flex!important}
  }
  @media (max-width:480px){
    .soc-cardgrid{grid-template-columns:1fr!important}
  }
  .node{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin:0 0 16px;box-shadow:0 1px 2px rgba(21,23,28,.04)}
.wk-grid{display:grid;grid-template-columns:1fr 230px;gap:26px;align-items:start}
.wk-grid{grid-template-columns:1fr}
.wk-rail{display:none}
.wk-sec{font-size:1.25rem;font-weight:700;color:var(--ink);margin:0 0 13px;padding-bottom:8px;border-bottom:2px solid var(--red);display:inline-block}
.wk-hint{font-size:.84rem;color:var(--ink-faint);margin:0 0 10px}
.wk-oc{display:flex;gap:10px;align-items:flex-start;margin:9px 0;font-size:.96rem;color:var(--ink)}
.wk-oc .b{flex:none;width:19px;height:19px;border-radius:6px;border:2px solid var(--border);margin-top:2px}
.wk-gq{display:flex;gap:9px;align-items:flex-start;margin:8px 0;font-size:.94rem;color:var(--ink-dim)}
.wk-gq .q{color:var(--red);font-weight:800}
.wk-concept{padding:0 0 4px 15px;border-left:3px solid #1B2A4A;margin:16px 0}
.wk-concept h3{font-size:1.02rem;font-weight:700;margin:0 0 4px;color:var(--ink)}
.wk-concept p{margin:0;color:var(--ink-dim);line-height:1.6}
.wk-cite{font-size:.8rem;color:var(--ink-faint);font-style:italic}
.wk-term{margin:12px 0;color:var(--ink-dim);line-height:1.55}
.wk-term b{color:var(--ink)}
.wk-read{border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin:11px 0;font-size:.92rem}
.wk-read .ref{color:var(--ink);line-height:1.5}
.wk-read em{font-style:italic}
.wk-scope{display:inline-block;margin-top:9px;font-size:.74rem;color:var(--ink-dim);background:var(--soft);border:none;border-radius:6px;padding:4px 10px;cursor:pointer}
.wk-deck{position:relative;aspect-ratio:16/9;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:#16213B}
.wk-deck iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.wk-fs{display:inline-block;margin-top:10px;font-size:.82rem;font-weight:600;color:#1552D8;text-decoration:none}
.wk-whatwhy{background:var(--soft);border-radius:11px;padding:14px 16px;margin:0 0 14px;font-size:.93rem;color:var(--ink-dim);line-height:1.6}
.wk-whatwhy b{color:var(--ink)}
.wk-cta{display:inline-flex;align-items:center;gap:7px;background:var(--red);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-size:.92rem;font-weight:700;cursor:pointer}
.wk-ocheck{background:var(--soft);border-radius:11px;padding:14px 16px;margin:0 0 6px}
.wk-row{display:flex;gap:9px;align-items:center;font-size:.9rem;color:var(--ink);margin:6px 0}
.wk-row .t{color:#1f7a4d;display:inline-flex}
.wk-q{margin:12px 0;font-size:.95rem;color:var(--ink)}
.wk-opts{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.wk-opt{font-size:.78rem;font-weight:600;color:var(--ink-dim);border:1.5px solid var(--border);border-radius:999px;padding:6px 13px;background:#fff;cursor:pointer}
.wk-opt.on{border-color:var(--red);background:#F6E3E1;color:#15171C}
.wk-resetrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:12px 0 2px;font-size:.78rem;color:var(--ink-faint)}
.wk-reset{border:1px solid var(--border);background:#fff;color:var(--ink-dim);border-radius:999px;padding:6px 11px;font-size:.76rem;font-weight:700;cursor:pointer}
.wk-reset:hover{border-color:var(--red);color:var(--red)}
.wk-ta{width:100%;min-height:74px;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font:inherit;font-size:.9rem;resize:vertical}
.wk-savebox{background:#FBF4F3;border:1px solid #E6C3BE;border-radius:11px;padding:15px 17px;margin-top:14px}
.wk-savebox h3{margin:0 0 6px;font-size:1.02rem;font-weight:700}
.wk-savebox ul{margin:6px 0 12px;padding-left:20px;font-size:.9rem;color:var(--ink-dim)}
.wk-savebox li{margin:3px 0}
.wk-save{background:var(--red);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-size:.9rem;font-weight:700;cursor:pointer}
.wk-rail{position:sticky;top:78px}
.wk-railbox{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px}
.wk-railh{font-family:var(--mono);font-size:.64rem;letter-spacing:.07em;color:var(--ink-faint);font-weight:700;margin-bottom:12px}
.wk-railbox a{display:flex;gap:9px;align-items:center;text-decoration:none;color:var(--ink-dim);padding:6px 0;font-weight:600;font-size:.84rem}
.wk-railbox a .s{flex:none;width:14px;height:14px;border-radius:50%;border:2px solid var(--border)}
.wk-railbox a:hover{color:var(--red)}
.wk-railt{font-size:.72rem;color:var(--ink-faint);margin-top:12px;padding-top:12px;border-top:1px solid var(--soft);display:flex;align-items:center;gap:5px}
  .wk-resetrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:12px 0 2px;font-size:.78rem;color:var(--ink-faint)}
  .wk-reset{border:1px solid var(--border);background:#fff;color:var(--ink-dim);border-radius:999px;padding:6px 11px;font-size:.76rem;font-weight:700;cursor:pointer}
</style>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
</head>

</html>
